<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunal CRM · Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(135deg,#1a1008 0%,#3d2e1a 100%);
    min-height:100vh;display:grid;place-items:center;padding:20px;color:#1a1008;
  }
  .login-card{
    background:#fbf7f0;border-radius:20px;padding:40px;
    width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .logo{
    width:80px;height:80px;border-radius:20px;
    background:linear-gradient(135deg,#ff6846,#e5502e);
    display:grid;place-items:center;margin:0 auto 24px;
    color:#fff;font-family:'Archivo Black',sans-serif;font-size:40px;
  }
  h1{font-family:'Archivo Black',sans-serif;text-align:center;font-size:28px;margin-bottom:8px}
  .subtitle{text-align:center;color:#6b5a45;margin-bottom:32px;font-size:14px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;font-weight:600;color:#6b5a45;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
  .field input{
    width:100%;padding:12px 16px;border:2px solid #e0d4bd;border-radius:10px;
    font-size:15px;background:#fff;font-family:inherit;
  }
  .field input:focus{outline:none;border-color:#ff6846}
  .btn{
    width:100%;padding:14px;background:#ff6846;color:#fff;
    border:none;border-radius:10px;font-weight:700;font-size:15px;
    cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .btn:hover{background:#e5502e}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .error{
    background:#f0dcd8;color:#a8453a;padding:12px;border-radius:10px;
    margin-bottom:16px;font-size:13px;display:none;
  }
  .error.show{display:block}
  .info{
    margin-top:24px;padding:14px;background:#fff0ed;border-radius:10px;
    font-size:12px;color:#6b5a45;line-height:1.5;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">C</div>
  <h1>COMUNAL CRM</h1>
  <p class="subtitle">Sistema de cobranza y pedidos</p>

  <div class="error" id="errorBox"></div>

  <div class="field">
    <label>Correo</label>
    <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Entrar</button>

  <div class="info">
    💡 <strong>Primera vez?</strong> El admin debe crearte una cuenta desde el panel de Supabase. Si no tienes acceso, contacta a tu administrador.
  </div>
</div>

<script>
  // Configuración de Supabase
  const SUPABASE_URL = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || '';
  const SUPABASE_KEY = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY') || '';

  if (!SUPABASE_URL || !SUPABASE_KEY) {
    document.body.innerHTML = `
      <div class="login-card">
        <h1 style="color:#a8453a">⚠️ Configuración faltante</h1>
        <p style="margin-top:16px;color:#6b5a45">El sistema no está configurado. Si eres el administrador, configura las variables SUPABASE_URL y SUPABASE_KEY.</p>
      </div>
    `;
  }

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si ya está logueado, redirigir a la app
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      window.location.href = '/app.html';
    }
  });

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('loginBtn');

    errorBox.classList.remove('show');
    if (!email || !password) {
      errorBox.textContent = 'Llena correo y contraseña';
      errorBox.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = error.message === 'Invalid login credentials'
        ? 'Correo o contraseña incorrectos'
        : error.message;
      errorBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    window.location.href = '/app.html';
  }

  // Enter para login
  document.getElementById('password').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>
